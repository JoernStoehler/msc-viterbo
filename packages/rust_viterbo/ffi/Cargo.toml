# Python FFI for EHZ capacity algorithms
# See docs/ffi-contract.md for the API spec

[package]
name = "rust_viterbo_ffi"
version = "0.3.0"  # Tube algorithm implemented
edition = "2021"

[lib]
crate-type = ["cdylib"]

[dependencies]
pyo3 = { version = "0.22", features = ["extension-module"] }
tube = { path = "../tube" }
nalgebra = "0.33"
